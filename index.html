<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Emerson">
<meta name="theme-color" content="#F6F4EF">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>Emerson's schedule</title>
<style>
  :root {
    --bg: #F6F4EF;
    --card: #FFFFFF;
    --ink: #23303F;
    --ink-soft: #5B6675;
    --line: #E1DDD3;
    --overnight: #2F6E68;
    --overnight-bg: #E2EFEC;
    --overnight-ink: #1E4A46;
    --day: #C07C1F;
    --day-bg: #F6E8D2;
    --day-ink: #7A4E11;
    --both-bg: linear-gradient(135deg, #E2EFEC 50%, #F6E8D2 50%);
    --today-ring: #2F6E68;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    min-height: 100vh;
  }
  body { padding: 28px 16px calc(60px + env(safe-area-inset-bottom)); }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 {
    font-family: Georgia, "Iowan Old Style", serif;
    font-size: 26px;
    font-weight: 600;
    margin: 0 0 2px;
  }
  .subtitle { color: var(--ink-soft); font-size: 14px; margin: 0 0 24px; }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 18px;
  }

  /* --- Auth screen --- */
  #authScreen { max-width: 400px; margin: 80px auto; text-align: center; }
  #authScreen h1 { margin-bottom: 8px; }
  #authScreen p { color: var(--ink-soft); font-size: 14px; margin-bottom: 20px; }
  #authScreen input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 10px;
    font-size: 15px;
    margin-bottom: 10px;
  }
  #authScreen button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: var(--overnight);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  #authStatus { font-size: 13px; color: var(--ink-soft); margin-top: 12px; min-height: 18px; }
  #app { display: none; }
  #app.visible { display: block; }
  .signout { font-size: 12px; color: var(--ink-soft); text-align: right; margin-bottom: 10px; cursor: pointer; text-decoration: underline; }

  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .stat { text-align: left; }
  .stat .label { font-size: 12px; color: var(--ink-soft); margin-bottom: 4px; }
  .stat .value { font-size: 22px; font-weight: 600; }
  .stat.overnight .value { color: var(--overnight-ink); }
  .stat.day .value { color: var(--day-ink); }

  .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .month-nav button {
    border: 1px solid var(--line); background: var(--card); border-radius: 8px;
    padding: 6px 12px; cursor: pointer; font-size: 14px; color: var(--ink);
  }
  .month-nav button:hover { background: #F0EDE5; }
  .month-label { font-size: 16px; font-weight: 600; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .dow { text-align: center; font-size: 11px; color: var(--ink-soft); padding-bottom: 4px; }
  .day-cell {
    position: relative; aspect-ratio: 1; border-radius: 8px; border: 1px solid var(--line);
    background: var(--card); display: flex; align-items: center; justify-content: center;
    font-size: 13px; cursor: pointer; color: var(--ink);
  }
  .day-cell.empty { visibility: hidden; cursor: default; }
  .day-cell.overnight { background: var(--overnight-bg); color: var(--overnight-ink); border-color: var(--overnight); font-weight: 600; }
  .day-cell.day-visit { background: var(--day-bg); color: var(--day-ink); border-color: var(--day); font-weight: 600; }
  .day-cell.both { background: var(--both-bg); color: var(--ink); border-color: var(--overnight); font-weight: 600; }
  .day-cell.today { box-shadow: 0 0 0 2px var(--today-ring); }
  .day-cell.selected { box-shadow: 0 0 0 2px var(--ink); }
  .day-cell.selected.today { box-shadow: 0 0 0 2px var(--today-ring), 0 0 0 4px var(--ink); }
  .day-cell .note-dot { position: absolute; bottom: 3px; width: 4px; height: 4px; border-radius: 50%; background: var(--ink-soft); }

  .legend { display: flex; gap: 16px; margin-top: 12px; font-size: 12px; color: var(--ink-soft); flex-wrap: wrap; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .swatch { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }

  .editor { display: none; margin-top: 16px; border-top: 1px solid var(--line); padding-top: 16px; }
  .editor.open { display: block; }
  .editor .edit-date { font-weight: 600; margin-bottom: 10px; }
  .type-choices { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .type-choices button {
    flex: 1; min-width: 90px; border: 1px solid var(--line); background: var(--card);
    border-radius: 8px; padding: 8px 6px; font-size: 13px; cursor: pointer; color: var(--ink);
  }
  .type-choices button.active.overnight { background: var(--overnight-bg); border-color: var(--overnight); color: var(--overnight-ink); }
  .type-choices button.active.day-visit { background: var(--day-bg); border-color: var(--day); color: var(--day-ink); }
  .type-choices button.active.both { background: var(--both-bg); border-color: var(--overnight); }
  .type-choices button.active.none { background: #EFEFEF; border-color: #B9B9B9; }
  textarea {
    width: 100%; min-height: 54px; border: 1px solid var(--line); border-radius: 8px;
    padding: 8px 10px; font-family: inherit; font-size: 13px; resize: vertical; margin-bottom: 10px;
  }
  .editor-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .editor-actions button { border: 1px solid var(--line); border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; }
  .btn-save { background: var(--overnight); color: white; border-color: var(--overnight); }
  .btn-close { background: var(--card); color: var(--ink); }

  .log-section h2 { font-size: 15px; font-weight: 600; margin: 0 0 10px; }
  .log-entry { display: flex; justify-content: space-between; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 13px; gap: 10px; }
  .log-entry:last-child { border-bottom: none; }
  .log-left { display: flex; flex-direction: column; }
  .log-date { font-weight: 600; }
  .log-note { color: var(--ink-soft); margin-top: 2px; }
  .log-tag { font-size: 11px; padding: 3px 8px; border-radius: 100px; white-space: nowrap; height: fit-content; }
  .log-tag.overnight { background: var(--overnight-bg); color: var(--overnight-ink); }
  .log-tag.day-visit { background: var(--day-bg); color: var(--day-ink); }
  .log-tag.both { background: #EFE4DE; color: var(--ink); }
  .empty-log { color: var(--ink-soft); font-size: 13px; padding: 6px 0; }
  .save-status { font-size: 12px; color: var(--ink-soft); text-align: right; min-height: 16px; margin-top: 4px; }
</style>
</head>
<body>

<div id="authScreen">
  <h1>Emerson's schedule</h1>
  <p>Sign in with your email to access your tracker. We'll send you a one-time code — no password needed.</p>
  <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email" autocapitalize="off">
  <button id="sendLinkBtn">Send sign-in code</button>
  <input type="text" id="codeInput" placeholder="Verification code" inputmode="numeric" autocomplete="one-time-code" maxlength="10" style="display:none; margin-top:14px;">
  <button id="verifyCodeBtn" style="display:none;">Verify code</button>
  <div id="authStatus"></div>
</div>

<div id="app" class="wrap">
  <div class="signout" id="signOutBtn">Sign out</div>
  <h1>Emerson's schedule</h1>
  <p class="subtitle">Tracking overnights and daytime visits under the parenting plan</p>

  <div class="card"><div class="stats-grid" id="stats"></div></div>

  <div class="card">
    <div class="month-nav">
      <button id="prevMonth">&larr; Prev</button>
      <div class="month-label" id="monthLabel"></div>
      <button id="nextMonth">Next &rarr;</button>
    </div>
    <div class="cal-grid" id="dowRow"></div>
    <div class="cal-grid" id="calGrid" style="margin-top:6px;"></div>
    <div class="legend">
      <span><span class="swatch" style="background:var(--overnight-bg); border:1px solid var(--overnight);"></span>Overnight</span>
      <span><span class="swatch" style="background:var(--day-bg); border:1px solid var(--day);"></span>Day visit</span>
      <span><span class="swatch" style="background:var(--both-bg); border:1px solid var(--overnight);"></span>Both</span>
      <span><span class="swatch" style="background:#EFEFEF; border-radius:50%;"></span>Has a note</span>
    </div>

    <div class="editor" id="editor">
      <div class="edit-date" id="editDate"></div>
      <div class="type-choices">
        <button data-type="none" class="none">None</button>
        <button data-type="day-visit" class="day-visit">Day visit</button>
        <button data-type="overnight" class="overnight">Overnight</button>
        <button data-type="both" class="both">Both</button>
      </div>
      <textarea id="editNote" placeholder="Optional note (pickup time, reason for change, etc.)"></textarea>
      <div class="editor-actions">
        <button class="btn-close" id="closeEditor">Close</button>
        <button class="btn-save" id="saveEditor">Save</button>
      </div>
      <div class="save-status" id="saveStatus"></div>
    </div>
  </div>

  <div class="card log-section">
    <h2>Recent entries</h2>
    <div id="logList"></div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// ---- CONFIG: paste your Supabase project values here ----
const SUPABASE_URL = 'https://nximtvyqpdstpajggwrr.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_yrkA2ASdJZulD6E6bvq_5w_XS9Q7d75';
// -----------------------------------------------------------

// Entries added via chat land here. On first sign-in after adding new ones,
// they're upserted into Supabase (without touching anything already saved).
// Safe to leave in place or replace next time new dates are added.
const SEED_ENTRIES = {
  "2026-07-01": { type: "overnight", note: "Upper Peninsula, Michigan trip" },
  "2026-07-02": { type: "overnight", note: "Upper Peninsula, Michigan trip" },
  "2026-07-03": { type: "overnight", note: "Upper Peninsula, Michigan trip" },
  "2026-07-04": { type: "overnight", note: "Upper Peninsula, Michigan trip" },
  "2026-07-05": { type: "overnight", note: "Upper Peninsula, Michigan trip" },
  "2026-07-06": { type: "overnight", note: "Upper Peninsula, Michigan trip" },
  "2026-07-08": { type: "overnight", note: "" },
  "2026-07-09": { type: "overnight", note: "" },
  "2026-07-10": { type: "overnight", note: "" },
  "2026-07-11": { type: "overnight", note: "" },
  "2026-07-12": { type: "day-visit", note: "Slept at a friend's house that night (12th-13th)" },
  "2026-07-16": { type: "overnight", note: "Michigan trip" },
  "2026-07-17": { type: "overnight", note: "Michigan trip" },
  "2026-07-18": { type: "overnight", note: "Michigan trip" },
  "2026-07-19": { type: "day-visit", note: "Michigan trip, went home Sunday afternoon" }
};

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let schedule = {};       // { 'YYYY-MM-DD': { type, note, id } }
let viewYear, viewMonth;
let selectedDate = null;
let pendingType = 'none';
let noteDebounce = null;
let currentUser = null;

const today = new Date();
viewYear = today.getFullYear();
viewMonth = today.getMonth();

function fmtDateKey(y, m, d) {
  return y + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
}

// ---------- AUTH ----------
let pendingEmail = null;

document.getElementById('sendLinkBtn').addEventListener('click', async () => {
  const email = document.getElementById('emailInput').value.trim();
  const statusEl = document.getElementById('authStatus');
  if (!email) { statusEl.textContent = 'Enter your email first.'; return; }
  statusEl.textContent = 'Sending code...';
  const { error } = await supabase.auth.signInWithOtp({ email });
  if (error) {
    statusEl.textContent = 'Error: ' + error.message;
    return;
  }
  pendingEmail = email;
  statusEl.textContent = 'Check your email for the verification code.';
  document.getElementById('codeInput').style.display = '';
  document.getElementById('verifyCodeBtn').style.display = '';
  document.getElementById('codeInput').focus();
});

document.getElementById('verifyCodeBtn').addEventListener('click', async () => {
  const code = document.getElementById('codeInput').value.trim();
  const statusEl = document.getElementById('authStatus');
  if (!pendingEmail) { statusEl.textContent = 'Enter your email and request a code first.'; return; }
  if (!code) { statusEl.textContent = 'Enter the verification code.'; return; }
  statusEl.textContent = 'Verifying...';
  const { error } = await supabase.auth.verifyOtp({ email: pendingEmail, token: code, type: 'email' });
  statusEl.textContent = error ? ('Error: ' + error.message) : '';
});

document.getElementById('signOutBtn').addEventListener('click', async () => {
  await supabase.auth.signOut();
  window.location.reload();
});

async function initAuth() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    currentUser = session.user;
    showApp();
  }
  supabase.auth.onAuthStateChange((event, session) => {
    if (session) {
      currentUser = session.user;
      showApp();
    }
  });
}

async function showApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  await loadSchedule();
}

// ---------- DATA ----------
async function loadSchedule() {
  const { data, error } = await supabase
    .from('schedule_entries')
    .select('*')
    .eq('user_id', currentUser.id);

  schedule = {};
  if (!error && data) {
    data.forEach(row => {
      schedule[row.entry_date] = { type: row.type, note: row.note || '', id: row.id };
    });
  }

  // Merge in any chat-added seed entries not already saved
  const missing = Object.keys(SEED_ENTRIES).filter(k => !schedule[k]);
  if (missing.length > 0) {
    const rows = missing.map(k => ({
      user_id: currentUser.id,
      entry_date: k,
      type: SEED_ENTRIES[k].type,
      note: SEED_ENTRIES[k].note || ''
    }));
    const { data: inserted, error: insertErr } = await supabase
      .from('schedule_entries')
      .upsert(rows, { onConflict: 'user_id,entry_date' })
      .select();
    if (!insertErr && inserted) {
      inserted.forEach(row => {
        schedule[row.entry_date] = { type: row.type, note: row.note || '', id: row.id };
      });
    }
  }

  render();
}

async function commitEntry() {
  if (!selectedDate) return;
  const note = document.getElementById('editNote').value.trim();
  const statusEl = document.getElementById('saveStatus');
  statusEl.textContent = 'Saving...';

  try {
    if (!currentUser) throw new Error('Not signed in — please sign in again.');

    let error = null;

    if (pendingType === 'none') {
      const existing = schedule[selectedDate];
      if (existing && existing.id) {
        ({ error } = await supabase.from('schedule_entries').delete().eq('id', existing.id));
      }
      if (!error) delete schedule[selectedDate];
    } else {
      const { data, error: upsertError } = await supabase
        .from('schedule_entries')
        .upsert({
          user_id: currentUser.id,
          entry_date: selectedDate,
          type: pendingType,
          note
        }, { onConflict: 'user_id,entry_date' })
        .select()
        .single();
      error = upsertError;
      if (!error && data) {
        schedule[selectedDate] = { type: data.type, note: data.note || '', id: data.id };
      }
    }

    if (error) {
      statusEl.textContent = 'Error: ' + error.message;
    } else {
      statusEl.textContent = 'Saved';
      setTimeout(() => { if (statusEl.textContent === 'Saved') statusEl.textContent = ''; }, 1200);
    }
  } catch (err) {
    statusEl.textContent = 'Error: ' + (err && err.message ? err.message : String(err));
  }
  renderStats();
  renderCalendar();
  renderLog();
}

// ---------- RENDER ----------
function computeStats() {
  const keys = Object.keys(schedule);
  let overnightTotal = 0, dayTotal = 0, overnightMonth = 0, dayMonth = 0;
  keys.forEach(k => {
    const entry = schedule[k];
    const [y, m] = k.split('-').map(Number);
    const isOvernight = entry.type === 'overnight' || entry.type === 'both';
    const isDay = entry.type === 'day-visit' || entry.type === 'both';
    if (isOvernight) overnightTotal++;
    if (isDay) dayTotal++;
    if (y === viewYear && (m - 1) === viewMonth) {
      if (isOvernight) overnightMonth++;
      if (isDay) dayMonth++;
    }
  });
  return { overnightTotal, dayTotal, overnightMonth, dayMonth };
}

function renderStats() {
  const s = computeStats();
  const monthName = new Date(viewYear, viewMonth, 1).toLocaleString('default', { month: 'long' });
  document.getElementById('stats').innerHTML = `
    <div class="stat overnight"><div class="label">Overnights (${monthName})</div><div class="value">${s.overnightMonth}</div></div>
    <div class="stat day"><div class="label">Day visits (${monthName})</div><div class="value">${s.dayMonth}</div></div>
    <div class="stat"><div class="label">All-time overnights</div><div class="value">${s.overnightTotal}</div></div>
  `;
}

function renderDow() {
  const dows = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  document.getElementById('dowRow').innerHTML = dows.map(d => `<div class="dow">${d}</div>`).join('');
}

function renderCalendar() {
  const label = new Date(viewYear, viewMonth, 1).toLocaleString('default', { month: 'long', year: 'numeric' });
  document.getElementById('monthLabel').textContent = label;

  const firstDow = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  let html = '';
  for (let i = 0; i < firstDow; i++) html += '<div class="day-cell empty"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const key = fmtDateKey(viewYear, viewMonth, d);
    const entry = schedule[key];
    let cls = 'day-cell';
    if (entry) {
      if (entry.type === 'overnight') cls += ' overnight';
      else if (entry.type === 'day-visit') cls += ' day-visit';
      else if (entry.type === 'both') cls += ' both';
    }
    const isToday = viewYear === today.getFullYear() && viewMonth === today.getMonth() && d === today.getDate();
    if (isToday) cls += ' today';
    if (key === selectedDate) cls += ' selected';
    const hasNote = entry && entry.note ? '<span class="note-dot"></span>' : '';
    html += `<div class="${cls}" data-key="${key}">${d}${hasNote}</div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
  document.querySelectorAll('.day-cell:not(.empty)').forEach(cell => {
    cell.addEventListener('click', () => openEditor(cell.dataset.key));
  });
}

function renderLog() {
  const keys = Object.keys(schedule).sort().reverse().slice(0, 15);
  const el = document.getElementById('logList');
  if (keys.length === 0) {
    el.innerHTML = '<div class="empty-log">No entries yet. Click a date on the calendar to log a visit.</div>';
    return;
  }
  el.innerHTML = keys.map(k => {
    const entry = schedule[k];
    const dateObj = new Date(k + 'T00:00:00');
    const dateStr = dateObj.toLocaleDateString('default', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
    const tagLabel = entry.type === 'overnight' ? 'Overnight' : entry.type === 'day-visit' ? 'Day visit' : 'Both';
    return `<div class="log-entry">
      <div class="log-left">
        <div class="log-date">${dateStr}</div>
        ${entry.note ? `<div class="log-note">${escapeHtml(entry.note)}</div>` : ''}
      </div>
      <span class="log-tag ${entry.type}">${tagLabel}</span>
    </div>`;
  }).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function openEditor(key) {
  if (selectedDate && selectedDate !== key) {
    clearTimeout(noteDebounce);
    await commitEntry();
  }
  selectedDate = key;
  const entry = schedule[key];
  pendingType = entry ? entry.type : 'none';
  const dateObj = new Date(key + 'T00:00:00');
  document.getElementById('editDate').textContent = dateObj.toLocaleDateString('default', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  document.getElementById('editNote').value = entry && entry.note ? entry.note : '';
  document.getElementById('saveStatus').textContent = '';
  updateTypeButtons();
  renderCalendar();
  document.getElementById('editor').classList.add('open');
  document.getElementById('editor').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function updateTypeButtons() {
  document.querySelectorAll('.type-choices button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.type === pendingType);
  });
}

document.querySelectorAll('.type-choices button').forEach(btn => {
  btn.addEventListener('click', async () => {
    pendingType = btn.dataset.type;
    updateTypeButtons();
    await commitEntry();
  });
});

document.getElementById('editNote').addEventListener('input', () => {
  clearTimeout(noteDebounce);
  noteDebounce = setTimeout(commitEntry, 600);
});

document.getElementById('closeEditor').addEventListener('click', async () => {
  clearTimeout(noteDebounce);
  await commitEntry();
  document.getElementById('editor').classList.remove('open');
  selectedDate = null;
  renderCalendar();
});

document.getElementById('saveEditor').addEventListener('click', async () => {
  clearTimeout(noteDebounce);
  await commitEntry();
  document.getElementById('editor').classList.remove('open');
});

document.getElementById('prevMonth').addEventListener('click', () => {
  viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  render();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  render();
});

function render() {
  renderStats();
  renderDow();
  renderCalendar();
  renderLog();
}

initAuth();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
